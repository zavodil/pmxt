    post:
      description: '## Description

        This will return a token that can be used in the Authentication header in
        the

        form "Session-Token <your_token>" on authenticated requests.<br>

        The token is valid for 30min, but if you make an authenticated request

        with it, it will be renewed for the next 30min.


        ##  Rate limits

        Maximum 10 requests per 60 seconds<br>'
      operationId: create_session
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                create_social_member:
                  description: If true, and the user logging in does not have an associated
                    social member,this call will also take care of creating the social
                    member for this user
                  example: true
                  type: boolean
                password:
                  description: Your account password
                  example: verysecurepassword
                  minLength: 1
                  type: string
                remember:
                  description: 'True if the client wants Smarkets to allow

                    this device to renew the token even after its expiration'
                  example: true
                  type: boolean
                reopen_account:
                  description: If true, and the user has closed their own account,then
                    their account will be reopened and they will log in as normal.
                  example: false
                  type: boolean
                use_auth_v2:
                  description: If true, and the user logging will be forced to use
                    auth v2,and should expect refresh_token and access_token in the
                    cookies and response
                  example: false
                  type: boolean
                username:
                  description: Your username
                  example: john.doe@company.com
                  format: email
                  type: string
              required:
              - password
              - username
              title: session_create
              type: object
        description: JSON Request object
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Token response for old and new auth v2.
                oneOf:
                - additionalProperties: false
                  description: Token response
                  properties:
                    created_social_member:
                      example: true
                      type: boolean
                    factor:
                      description: "\nNext factor for authentication to complete,\
                        \ used in multi factor authentication:\n<ul>\n<li>complete:\
                        \ Login is complete and there is no further factor required.\n\
                        <li>totp: Login is incomplete and needs the totp code.\n<li>nemid:\
                        \ Login is incomplete and needs nemid confirmation.<li>\n\
                        </ul>\n    "
                      enum:
                      - complete
                      - totp
                      - nemid
                      example: complete
                      type: string
                    nemid_session_id:
                      description: Session id for Denmark nemid authorization
                      example: 776071e7-6b96-41af-8fa2-7fed98e227fd
                      type: string
                    redirect_url:
                      description: Redirect url to complete nemid authorization flow
                      example: https://test.zignsec.com/v2/Hosted/776071e7-6b96-41af-8fa2-7fed98e227fd/nemid/
                      type: string
                    stop:
                      description: "\nThis datetime specifies when the token will\
                        \ expire if not renewed.<br>\nAny authenticated API call will\
                        \ automatically renew the token for another 30min<br>\n  \
                        \  "
                      example: '2018-01-24T19:49:43.964757'
                      format: date-time
                      nullable: true
                      type: string
                    token:
                      description: "\nThis session token can be used to make authenticated\
                        \ requests to Smarkets.<br>\nWe will resolve the who the user\
                        \ is based on this.<br>\nAccount information, orders, up-to-date\
                        \ prices are examples that will require it to be sent.\n \
                        \   "
                      example: WzM2NjI1MDIsMjIyMDIxMzJd.jKWaw5j3XtYX6huY7HZVEvISu6k
                      nullable: true
                      type: string
                    verify:
                      description: True if further verification is required
                      example: true
                      type: boolean
                  required:
                  - token
                  - stop
                  title: token_response
                - additionalProperties: false
                  description: Token response for auth v2
                  properties:
                    created_social_member:
                      example: true
                      type: boolean
                    factor:
                      description: "\nNext factor for authentication to complete,\
                        \ used in multi factor authentication:\n<ul>\n<li>complete:\
