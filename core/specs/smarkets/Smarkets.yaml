      security:
      - api_key: []
      summary: Retrieve current orders on Smarkets, these include open and recently
        settled orders.
      tags:
      - orders
    post:
      description: '## Description

        This route only works for Smarkets API users, other users will receive a 403
        status code response.<br><br>

        For immediate_or_cancel orders type, the route will return when the order
        is matched (or cancelled).<br>

        For all other order types, the route will return when the order is accepted
        by the exchange.<br>

        In the latter case, GET v3/orders should be used to check the status of the
        order, using the order id

        returned by this response.


        ##  Rate limits

        Rate limits are applied on an per account basis'
      operationId: create_order
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                contract_id:
                  description: This ID uniquely identifies the contract
                  example: '123456'
                  pattern: ^[0-9]+$
                  type: string
                label:
                  description: 'Label is a user-defined string that will be stored
                    in the order.

                    It can be used to identify different trading strategies'
                  example: strategy_1
                  type: string
                market_id:
                  description: This ID uniquely identifies the market
                  example: '128939'
                  pattern: ^[0-9]+$
                  type: string
                minimum_accepted_quantity:
                  description: "\nIf this minimum accepted quantity is not matched\
                    \ on bet placement time,\nthe order will be cancelled and nothing\
                    \ will be matched.<br>\nOnly applicable to immediate_or_cancel\
                    \ order types.\n    "
                  example: 10000
                  maximum: 4294967295
                  minimum: 0
                  type: integer
                price:
                  description: '

                    This price is in percentage basis points.<br>

                    Example: 5000 = 50% <br>

                    To convert it to decimal odds, just divide 10000 by it<br>

                    Example: 10000 / 5000 = 2.0 (decimal odds).<br>

                    This price has to conform to a valid tick on the exchange;

                    an invalid price error will be returned if it does not.'
                  example: 5000
                  maximum: 9999
                  minimum: 1
                  type: integer
                quantity:
                  description: "\n    Quantity is the sum of the total pot (back+lay)\
                    \ in case the order is matched<br>\n    The units are 1/10000\
                    \ * one unit of the user's currency.<br>\n    Example: Quantity\
                    \ 500 = 0.05 GBP<br>\n    To convert it to back stake, just multiply\
                    \ by the price and divide by 100000000<br>\n    Example: 100000\
                    \ (quantity) * 5000 (price) / 100000000 = 5 GBP back stake<br>\n\
                    \    The minimum stake is £0.05 or currency equivalent"
                  example: 10000
                  maximum: 4294967295
                  minimum: 0
                  type: integer
                side:
                  description: '

                    side can either be:<ul>

                    <li>buy: backing a contract

                    <li>sell: laying a contract

                    </ul>'
                  enum:
                  - buy
                  - sell
                  example: buy
                  type: string
                type:
                  default: good_til_halted
                  description: "Order types can have the following values:\n    <ul>\n\
                    \    <li>good_til_cancelled: this order will be open until a reduction\n\
                    \    factor is applied or a market state changes to live, which\
                    \ will cancel the order.\n    <li>keep_in_play: the same as good_til_cancelled,\n\
                    \    except it will not be cancelled on market state changes\n\
                    \    <li>good_til_halted: the same as good_til_cancelled, except\
                    \ a market\n    <li>immediate_or_cancel: if the minimum_accepted_quantity\
                    \ is not\n    matched at the time of order placement, this order\
                    \ will be cancelled. \n    </ul>\n    <p>The following table explains\
                    \ the lifetime of orders:</p>\n    <table cellpadding=\"3\" style=\"\
                    border: 1px solid white;\">\n      <tr>\n        <th>order_type</th>\n\
                    \        <th>Market Goes Live</th>\n        <th>Market Halted</th>\n\
                    \        <th>Reduction Factor Applied</th>\n      </tr>\n    \
                    \  <tr>\n        <td>good_til_cancelled</td>\n        <td>Cancelled</td>\n\
                    \        <td>Cancelled</td>\n        <td>Cancelled</td>\n    \
                    \  </tr>\n      <tr>\n        <td>good_til_halted</td>\n     \
                    \   <td>Kept</td>\n        <td>Cancelled</td>\n        <td>Cancelled</td>\n\
                    \      </tr>\n      <tr>\n        <td>keep_in_play</td>\n    \
                    \    <td>Kept</td>\n        <td>Kept</td>\n        <td>Cancelled</td>\n\
                    \      </tr>\n    </table><br>\n    <p>Orders marked as immediate_or_cancel\
                    \ must be executed\n    immediately and thus will not remain in\
                    \ the book.</p>\n    "
                  enum:
                  - good_til_cancelled
                  - keep_in_play
                  - good_til_halted
                  - immediate_or_cancel
                  example: good_til_halted
                  type: string
              required:
              - market_id
              - contract_id
              - price
              - quantity
              - side
              type: object
        description: JSON Request object
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Order placement success
                properties:
                  available_balance:
                    description: 'Current available balance on the account,

                      it is equal to the balance deducted by the exposure'
                    example: '100.00'
                    type: string
                  available_quantity:
                    description: Quantity left to be matched in the order
                    example: 15000
                    type: integer
                  contract_id:
                    description: This ID uniquely identifies the contract
                    example: '123456'
                    pattern: ^[0-9]+$
                    type: string
                  executed_avg_price:
                    description: The average price for the executions on the order
                    example: 5000
                    nullable: true
                    type: integer
                  exposure:
                    description: Current exposure on the account
                    example: '-50.00'
                    type: string
                  market_id:
                    description: This ID uniquely identifies the market
                    example: '128939'
                    pattern: ^[0-9]+$
                    type: string
                  order_id:
                    description: This ID uniquely identifies an order
                    example: '1518455672861'
                    pattern: ^[0-9]+$
                    type: string
                  orig_price:
                    description: 'The price at which the order was placed at, it can
                      be different

                      from the matched price. This value will be null if there were
                      no executions.'
                    example: 5000
                    nullable: true
                    type: integer
                  price:
                    description: '

                      This price is in percentage basis points.<br>

                      Example: 5000 = 50% <br>

                      To convert it to decimal odds, just divide 10000 by it<br>

                      Example: 10000 / 5000 = 2.0 (decimal odds).<br>

                      This price has to conform to a valid tick on the exchange;

                      an invalid price error will be returned if it does not.'
                    example: 5000
                    maximum: 9999
                    minimum: 1
                    type: integer
                  quantity:
                    description: "\n    Quantity is the sum of the total pot (back+lay)\
                      \ in case the order is matched<br>\n    The units are 1/10000\
                      \ * one unit of the user's currency.<br>\n    Example: Quantity\
                      \ 500 = 0.05 GBP<br>\n    To convert it to back stake, just\
                      \ multiply by the price and divide by 100000000<br>\n    Example:\
                      \ 100000 (quantity) * 5000 (price) / 100000000 = 5 GBP back\
                      \ stake<br>\n    The minimum stake is £0.05 or currency equivalent"
                    example: 10000
                    maximum: 4294967295
                    minimum: 0
                    type: integer
                  side:
                    description: '

                      side can either be:<ul>

                      <li>buy: backing a contract

                      <li>sell: laying a contract

                      </ul>'
                    enum:
                    - buy
                    - sell
                    example: buy
                    type: string
                  total_executed_quantity:
                    description: Quantity matched (executed) in the order
                    example: 15000
                    type: integer
                required:
                - market_id
                - contract_id
                - price
                - quantity
                - side
                - available_balance
                - available_quantity
                - executed_avg_price
                - exposure
                - order_id
                - orig_price
                - total_executed_quantity
                type: object
          description: Order placement success
