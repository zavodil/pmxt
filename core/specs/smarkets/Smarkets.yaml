            ORDER_REJECTED_LIMIT_EXCEEDED, ORDER_REJECTED_TRADING_SUSPENDED, ORDER_REJECTED_SERVICE_TEMPORARILY_UNAVAILABLE,
            ORDER_REJECTED_ACCOUNT_SUSPENDED, ORDER_REJECTED_MARKET_HALTED, ORDER_REJECTED_MARKET_NOT_OPEN,
            ORDER_REJECTED_CAPACITY_REACHED, ORDER_CANCELLED_MEMBER_REQUESTED, ORDER_REJECTED_CONTRACT_SETTLED,
            ORDER_REJECTED_CONTRACT_NOT_FOUND, ORDER_INVALID_INVALID_QUANTITY, ORDER_CANCELLED_ADMIN_REQUESTED,
            ORDER_CANCELLED_INSUFFICIENT_LIQUIDITY, ORDER_REJECTED_STAKE_LIMIT_EXCEEDED,
            ORDER_INVALID_INVALID_QUANTITY, ORDER_INVALID_INVALID_PRICE, ORDER_INVALID_INVALID_PRICE,
