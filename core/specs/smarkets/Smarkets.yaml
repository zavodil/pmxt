        '
      operationId: get_contracts_by_market_ids
      parameters:
      - deprecated: false
        description: 'Choose to include in the response contracts that are not visible
          on the website.

          Hidden contracts may not be displayed for a varied number of reasons, and
          are not available to bet on.'
        in: query
        name: include_hidden
        schema:
          default: false
          description: 'Choose to include in the response contracts that are not visible
            on the website.

            Hidden contracts may not be displayed for a varied number of reasons,
            and are not available to bet on.'
          type: boolean
      - deprecated: false
        description: Jurisdiction of user
        in: query
        name: jurisdiction
        schema:
          description: Jurisdiction of user
          enum:
          - CDG
          - CFTC
          - DGA
          - IGC
          - MGA
          - SGA
          - UKGC
          type: string
      - description: Market IDs to filter by<br>maxItems:100
        in: path
        name: market_ids
        required: true
        schema:
          items:
            type: integer
          maxItems: 100
          type: array
          uniqueItems: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Contracts success response
                properties:
                  contracts:
                    items:
                      additionalProperties: false
                      properties:
                        competitor_id:
                          description: The Smarkets competitor model id
                          example: 2
                          nullable: true
                          type: integer
                        contract_type:
                          description: 'Contract type uniquely identifies the contract
                            within a market.<br>

                            It is the recommended way to identify contracts.'
                          example:
                            name: HOME
                            param: apostolos-dedas
                          nullable: true
                          properties:
                            name:
                              example: HOME
                              type: string
                            param:
                              example: apostolos-dedas
                              type: string
                          type: object
                        created:
                          description: When was the contract created in the Smarkets
                            exchange
                          example: '2017-12-16T00:16:25.936519Z'
                          format: date-time
                          type: string
                        display_order:
                          description: 'Smarkets will display the contracts

                            sorted by these values, in descending order'
                          example: 100
                          nullable: true
                          type: integer
                        hidden:
                          description: Hidden contracts aren't displayed in our website
                          example: true
                          type: boolean
                        id:
                          description: This ID uniquely identifies the contract
                          example: '123456'
                          pattern: ^[0-9]+$
                          type: string
                        info:
                          description: Additional information about the contract
                          example:
                            color_primary: '#EF0107'
                            color_secondary: '#063672'
                            primary: true
                          nullable: true
                          properties:
                            color_primary:
                              maxLength: 7
                              minLength: 7
                              type: string
                            color_secondary:
                              maxLength: 7
                              minLength: 7
                              type: string
                            primary:
                              type: boolean
                          type: object
                        market_id:
                          description: This ID uniquely identifies the market
                          example: '128939'
                          pattern: ^[0-9]+$
                          type: string
                        modified:
                          description: 'The datetime of the last modification made
                            by Smarkets to the<br>

                            contract properties'
                          example: '2017-12-21T10:58:09.279148Z'
                          format: date-time
                          type: string
                        name:
                          description: 'Name for the contract, as displayed in our
                            website.<br>

                            Examples can be team names, horse names or other winning
                            outcomes for each market.<br>

                            It should not be used to identify the contract.<br>

                            The contract_type field should be used instead.'
                          example: Arsenal
                          type: string
                        outcome_timestamp:
                          description: 'If the contract has settled,

                            this will have the settlement datetime, null otherwise'
                          example: '2017-12-16T00:16:25.936519Z'
                          format: date-time
                          nullable: true
                          type: string
                        reduction_factor:
                          example: '0.45451'
                          pattern: ^[0-9]+(\.[0-9]+)?$
                          type: string
                        slug:
                          description: 'Slug concisely represents the contract.<br>

                            It should not be used to identify the contract.<br>

                            The contract_type field should be used instead.'
                          example: arsenal
                          type: string
                        state_or_outcome:
                          description: "\nstate_or_outcome can have the following\
                            \ values:\n<ul>\n<li>new: The contract was just created\
                            \ and is still not available for betting\n<li>open: open\
                            \ for betting\n<li>live: open and trading live in-play\n\
                            <li>halted: Trading on this contract has halted\n<li>winner:\
                            \ settled as winner.\n<li>loser:  settled as loser.\n\
                            <li>deadheat: settled as a deadheat - a tie with other\
                            \ contract.\n<li>reduced: withdrawn and a reduction factor\
                            \ was applied.\n<li>voided: no longer available for betting\n\
                            <li>unavailable: not currently available for betting\n\
                            </ul>\n    "
                          enum:
                          - live
                          - open
                          - new
                          - halted
                          - winner
                          - loser
                          - deadheat
                          - reduced
                          - voided
                          - unavailable
                          example: live
                          type: string
                        cftc:
                          description: CFTC-specific regulatory metadata for this contract
                          nullable: true
                          additionalProperties: true
                          type: object
