components:
  schemas:
    InternalServerError:
      additionalProperties: false
      properties:
        data:
          type: object
        error_type:
          enum:
          - INTERNAL_ERROR
          type: string
      required:
      - data
      - error_type
      type: object
    RateLimitError:
      additionalProperties: false
      properties:
        data:
          additionalProperties: false
          properties:
            count:
              type: number
            expiry:
              type: string
            limit:
              type: number
          required:
          - count
          - expiry
          - limit
          type: object
        error_type:
          enum:
          - RATE_LIMIT_EXCEEDED
          type: string
      required:
      - data
      - error_type
      type: object
    RequestValidationError:
      additionalProperties: false
      properties:
        data:
          type: string
        error_type:
          enum:
          - REQUEST_VALIDATION_ERROR
          type: string
      required:
      - data
      - error_type
      type: object
  securitySchemes:
    api_key:
      in: header
      name: Authorization
      type: apiKey
info:
  contact:
    email: api@smarkets.com
  description: "This is the HTTP trading API for Smarkets. It can be used to trade\
    \ on our exchange.\n    <br><br>For authenticated requests:<br>\n    <ul>\n  \
    \  <li>Get a session token using the login route:\n    <a class=\"nostyle\" href=\"\
    #/sessions/create_session\"><span>GET /v3/sessions/</span></a></li>\n    <li>Click\
    \ on 'Authorize \U0001F513', enter your token after 'Session-Token '\nand click\
    \ on the 'Authorize' button</li>\n    </ul>\n    <p>In order to place bets and\
    \ get the latest prices without restrictions\n    using this API, you need to\
    \ be a Smarkets API user.<br></p>\n    <p>We are not onboarding new API users\
    \ at this time, so please check back at a later\n    date if you are interested\
    \ in obtaining access.<br></p>\n    "
  title: Smarkets HTTP API
  version: '3'
openapi: 3.0.2
paths:
  /v3/account_activity_csv/{start_datetime}/{end_datetime}/:
    get:
      description: '## Description

        Start and end datetimes have to be separated by an hour, also these have to
        be exactly on the hour.


        '
      operationId: account_activity_csv
      parameters:
      - in: path
        name: start_datetime
        required: true
        schema:
          example: '2026-03-26T06:57:05Z'
          format: date-time
          type: string
      - in: path
        name: end_datetime
        required: true
        schema:
          example: '2026-03-26T06:57:05Z'
          format: date-time
          type: string
      responses:
        '400':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - REQUEST_VALIDATION_ERROR
                    - INVALID_DATETIMES
                    type: string
                required:
                - data
                - error_type
          description: REQUEST_VALIDATION_ERROR, INVALID_DATETIMES
        '401':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - AUTH_REQUIRED
                    type: string
                required:
                - data
                - error_type
          description: AUTH_REQUIRED
        '403':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - FORBIDDEN
                    type: string
                required:
                - data
                - error_type
          description: FORBIDDEN
        '404':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - NO_CSV_AVAILABLE
                    type: string
                required:
                - data
                - error_type
          description: NO_CSV_AVAILABLE
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
          description: Internal server error
      security:
      - api_key: []
      summary: "\n    Return the account activity between the two specified datetimes\
        \ as a gzipped CSV."
      tags:
      - account_activity
  /v3/accounts/:
    get:
      description: '

        '
      operationId: get_account
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Account fetch success
                properties:
                  account:
                    additionalProperties: false
                    properties:
                      account_id:
                        description: Unique identifier of the account
                        example: '123556546'
                        type: string
                      available_balance:
                        description: 'Current available balance on the account,

                          it is equal to the balance deducted by the exposure'
                        example: '100.00'
                        type: string
                      balance:
                        description: Current balance on the account
                        example: '150.00'
                        type: string
                      bonus_balance:
                        description: "Current bonus balance on the account;\n    \
                          \                losses will be refunded up to this amount"
                        example: '10.00'
                        type: string
                      commission_type:
                        description: Commission charged by Smarkets on the account
                        example: '0.02'
                        type: string
                      currency:
                        description: Currency of the account
                        enum:
                        - AUD
                        - BRL
                        - CAD
                        - CHF
                        - CZK
                        - DKK
                        - EUR
                        - GBP
                        - HKD
                        - HUF
                        - JPY
                        - NOK
                        - PLN
                        - SEK
                        - USD
                        example: GBP
                        type: string
                      exposure:
                        description: Current exposure on the account
                        example: '-50.00'
                        type: string
                      signup_date:
                        description: Date the account was created
                        example: '2021-01-01T00:00:00.000000'
                        type: string
                    required:
                    - account_id
                    - available_balance
                    - currency
                    - exposure
                    - balance
                    title: account
                    type: object
                required:
                - account
                title: account_response
                type: object
          description: Account fetch success
        '400':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - REQUEST_VALIDATION_ERROR
                    type: string
                required:
                - data
                - error_type
          description: REQUEST_VALIDATION_ERROR
        '401':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - AUTH_REQUIRED
                    type: string
                required:
                - data
                - error_type
          description: AUTH_REQUIRED
        '403':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  data:
                    type:
                    - string
                    - object
                  error_type:
                    enum:
                    - FORBIDDEN
                    type: string
                required:
                - data
                - error_type
          description: FORBIDDEN
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
          description: Internal server error
      security:
      - api_key: []
      summary: Retrieve account information.
      tags:
      - accounts
  /v3/accounts/activity/:
    get:
      description: '## Description

        This information should be used for accounting reconciliation.<br>

        This data is what is being used in <a href="https://smarkets.com/account/statement">our
        statement page</a>


        '
      operationId: get_activity
      parameters:
      - deprecated: false
        description: Maximum datetime for records
        in: query
        name: timestamp_max
        schema:
          description: Maximum datetime for records
          format: date-time
          type: string
      - deprecated: false
        description: Minimum datetime for records
        in: query
        name: timestamp_min
        schema:
          description: Minimum datetime for records
          format: date-time
          type: string
      - deprecated: false
        description: Maximum number of account activity rows to return on a single
          call
        in: query
        name: limit
        schema:
          default: 20
          description: Maximum number of account activity rows to return on a single
            call
          maximum: 500
          minimum: 0
          type: integer
      - deprecated: false
        description: Market IDs to filter by
        in: query
        name: market_id
        schema:
          description: Market IDs to filter by
          items:
            description: This ID uniquely identifies the market
            example: '128939'
            pattern: ^[0-9]+$
            type: string
          type: array
          uniqueItems: true
      - deprecated: false
        description: Order IDs to filter by
        in: query
        name: order_id
        schema:
          description: Order IDs to filter by
          items:
            description: This ID uniquely identifies an order
            example: '1518455672861'
            pattern: ^[0-9]+$
            type: string
          type: array
          uniqueItems: true
      - deprecated: false
        description: 'Last sequence number of the previous page.

          This parameter should be used for paginated requests'
        in: query
        name: pagination_last_seq
        schema:
          description: 'Last sequence number of the previous page.

            This parameter should be used for paginated requests'
          type: string
      - deprecated: false
        description: 'Last sub-sequence number of the previous page.

          This parameter should be used for paginated requests'
        in: query
        name: pagination_last_subseq
        schema:
          description: 'Last sub-sequence number of the previous page.

            This parameter should be used for paginated requests'
          type: string
      - deprecated: false
        description: '

          How to sort the results. When making paginated requests,

          pagination_last_seq and pagination_last_subseq should be used

          with the values from the last record of the previous page'
        in: query
        name: sort
        schema:
          default: -seq,-subseq
          description: '

            How to sort the results. When making paginated requests,

            pagination_last_seq and pagination_last_subseq should be used

            with the values from the last record of the previous page'
          enum:
          - seq,subseq
          - -seq,-subseq
          type: string
      - deprecated: false
        description: Account activity sources to filter by.
        in: query
        name: source
        schema:
          description: Account activity sources to filter by.
          items:
            description: 'The source of the account activity row is the

              trigger that generated the transaction to occur'
            enum:
            - admin.credit
            - admin.debit
            - bonus.credit
            - bonus.debit
            - commission.update
            - contract.reduce
            - contract.resettle
            - contract.settle
            - contract.unsettle
            - contract.void
            - contract.unreduce
            - deposit
            - deposit.approve
            - deposit.deny
            - deposit.request
            - execution.reduce
            - execution.settle
            - execution.unsettle
            - execution.unvoid
            - execution.void
            - market.partial_unsettle
            - market.resettle
            - market.settle
            - market.unsettle
            - market.unvoid
            - market.void
            - order.book.accept
            - order.book.cancel
            - order.book.reduce_qty
            - order.book.reject
            - order.cancel.reject
            - order.cancel_replace.book.accept
            - order.cancel_replace.book.reject
            - order.create
            - order.execute
            - order.execute.confirm
            - order.execute.void
            - order.pending.replace
            - order.reduce
            - order.reject.account_suspended
            - order.reject.insufficient_funds
            - order.reject.invalid_quantity
            - order.reject.limit_exceeded
            - order.reject.market_not_found
            - order.reject.stake_limit_exceeded
            - order.settle
            - order.unsettle
            - order.unvoid
            - order.void
            - withdraw
            - withdrawal.approve
            - withdrawal.deny
            - withdrawal.request
            - cash_out.complete
            - cash_out.request
            example: admin.credit
            type: string
          type: array
          uniqueItems: true
      - deprecated: false
        description: Should response be enhanced with include event information
        in: query
        name: event_info
        schema:
          default: false
          description: Should response be enhanced with include event information
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Account activity fetch success
                properties:
                  account_activity:
                    items:
                      additionalProperties: false
                      properties:
                        amount:
                          description: Amount relative to the order
                          example: '-19.00'
                          nullable: true
                          type: string
                        bet_token_type:
                          enum:
                          - free_bet
                          - boost_bet
                          - null
                          example: free_bet
                          nullable: true
                          type: string
                        bonus_bet:
                          example: false
                          type: boolean
                        bonus_change:
                          description: A change in the bonus balance
                          example: '10.00'
                          nullable: true
                          type: string
                        commission:
                          description: How much commission was charged
                          example: '2.20'
                          nullable: true
                          type: string
                        contract_id:
                          description: This ID uniquely identifies the contract
                          example: '123456'
                          nullable: true
                          pattern: ^[0-9]+$
                          type: string
                        event_id:
                          description: This ID uniquely identifies an event
                          example: '565413'
                          nullable: true
                          pattern: ^[0-9]+$
                          type: string
                        exposure:
                          description: Current exposure on the account
                          example: '-50.00'
                          nullable: true
                          type: string
                        extra:
                          description: Additional information about this row
                          example: market_halted
                          nullable: true
                          type: string
                        label:
                          description: 'Label is a user-defined string that will be
                            stored in the order.

                            It can be used to identify different trading strategies'
                          example: strategy_1
                          nullable: true
                          type: string
                        market_id:
                          description: This ID uniquely identifies the market
                          example: '128939'
                          nullable: true
                          pattern: ^[0-9]+$
                          type: string
                        money:
                          description: Balance of the account
                          example: '483.56'
                          nullable: true
                          type: string
                        money_change:
                          description: Change in the account's balance
                          example: '2.20'
                          nullable: true
                          type: string
                        order_id:
                          description: This ID uniquely identifies an order
                          example: '1518455672861'
                          nullable: true
                          pattern: ^[0-9]+$
                          type: string
                        price:
                          description: '

                            This price is in percentage basis points.<br>

                            Example: 5000 = 50% <br>

                            To convert it to decimal odds, just divide 10000 by it<br>

                            Example: 10000 / 5000 = 2.0 (decimal odds).<br>

                            This price has to conform to a valid tick on the exchange;

                            an invalid price error will be returned if it does not.'
                          example: 5000
                          nullable: true
                          type: integer
                        quantity:
                          description: "\n    Quantity is the sum of the total pot\
                            \ (back+lay) in case the order is matched<br>\n    The\
                            \ units are 1/100 of a UK penny.<br>\n    Example: Quantity\
                            \ 500 = 0.05 GBP<br>\n    To convert it to back stake,\
                            \ just multiply by the price and divide by 100000000<br>\n\
                            \    Example: 100000 (quantity) * 5000 (price) / 100000000\
                            \ = 5 GBP back stake<br>\n    The minimum stake is £0.05\
                            \ or currency equivalent"
                          example: 10000
                          maximum: 4294967295
                          minimum: 0
                          nullable: true
                          type: integer
                        quantity_change:
                          description: Change in the quantity in GBP
                          example: -290023
                          nullable: true
                          type: integer
                        quantity_user_currency:
                          description: "\n    Quantity is the sum of the total pot\
                            \ (back+lay) in case the order is matched<br>\n    The\
                            \ units are 1/10000 * one unit of the user's currency.<br>\n\
                            \    Example: Quantity 500 = 0.05 GBP<br>\n    To convert\
                            \ it to back stake, just multiply by the price and divide\
                            \ by 100000000<br>\n    Example: 100000 (quantity) * 5000\
                            \ (price) / 100000000 = 5 GBP back stake<br>\n    The\
                            \ minimum stake is £0.05 or currency equivalent"
                          example: 10000
                          maximum: 4294967295
                          minimum: 0
                          nullable: true
                          type: integer
                        quantity_user_currency_change:
                          description: Change in the quantity in user's currency
                          example: -2819
                          nullable: true
                          type: integer
                        seq:
                          description: Sequence number for the statement row
                          example: 11423
                          type: integer
                        side:
                          description: '

                            side can either be:<ul>

                            <li>buy: backing a contract

                            <li>sell: laying a contract

                            </ul>'
                          enum:
                          - buy
                          - sell
                          example: buy
                          nullable: true
                          type: string
                        source:
                          description: 'The source of the account activity row is
                            the

                            trigger that generated the transaction to occur'
                          enum:
                          - admin.credit
                          - admin.debit
                          - bonus.credit
                          - bonus.debit
                          - commission.update
                          - contract.reduce
                          - contract.resettle
                          - contract.settle
                          - contract.unsettle
                          - contract.void
                          - contract.unreduce
                          - deposit
                          - deposit.approve
                          - deposit.deny
                          - deposit.request
                          - execution.reduce
                          - execution.settle
                          - execution.unsettle
                          - execution.unvoid
                          - execution.void
                          - market.partial_unsettle
                          - market.resettle
                          - market.settle
                          - market.unsettle
                          - market.unvoid
                          - market.void
                          - order.book.accept
                          - order.book.cancel
                          - order.book.reduce_qty
                          - order.book.reject
                          - order.cancel.reject
                          - order.cancel_replace.book.accept
                          - order.cancel_replace.book.reject
                          - order.create
                          - order.execute
                          - order.execute.confirm
                          - order.execute.void
                          - order.pending.replace
                          - order.reduce
                          - order.reject.account_suspended
                          - order.reject.insufficient_funds
                          - order.reject.invalid_quantity
                          - order.reject.limit_exceeded
                          - order.reject.market_not_found
                          - order.reject.stake_limit_exceeded
                          - order.settle
                          - order.unsettle
                          - order.unvoid
                          - order.void
                          - withdraw
                          - withdrawal.approve
                          - withdrawal.deny
                          - withdrawal.request
                          - cash_out.complete
                          - cash_out.request
                          example: admin.credit
                          type: string
                        subseq:
                          description: Sub sequence number for the statement row
                          example: 123242
                          type: integer
                        timestamp:
                          description: When this transaction took place
                          example: '2017-02-01T10:23:54.361612'
                          format: date-time
                          type: string
                      title: account_activity_transaction
                      type: object
                    title: account_activity
                    type: array
                  contracts:
                    description: Array of contracts
                    items:
                      additionalProperties: false
                      description: Contract information required to display statement
                      properties:
                        name:
                          description: 'Name for the contract, as displayed in our
                            website.<br>

                            Examples can be team names, horse names or other winning
                            outcomes for each market.<br>

                            It should not be used to identify the contract.<br>

                            The contract_type field should be used instead.'
                          example: Arsenal
                          type: string
                        state_or_outcome:
                          description: "\nstate_or_outcome can have the following\
                            \ values:\n<ul>\n<li>new: The contract was just created\
                            \ and is still not available for betting\n<li>open: open\
                            \ for betting\n<li>live: open and trading live in-play\n\
                            <li>halted: Trading on this contract has halted\n<li>winner:\
                            \ settled as winner.\n<li>loser:  settled as loser.\n\
                            <li>deadheat: settled as a deadheat - a tie with other\
                            \ contract.\n<li>reduced: withdrawn and a reduction factor\
                            \ was applied.\n<li>voided: no longer available for betting\n\
                            <li>unavailable: not currently available for betting\n\
                            </ul>\n    "
                          enum:
                          - live
                          - open
                          - new
                          - halted
                          - winner
                          - loser
                          - deadheat
                          - reduced
                          - voided
                          - unavailable
                          example: live
                          type: string
                      required:
                      - name
                      - state_or_outcome
                      title: statement_event
                      type: object
                    title: contracts
                    type: array
                  events:
                    description: Array of events
                    items:
                      additionalProperties: false
                      description: Event information required to display statement
                      properties:
                        full_slug:
                          description: The URL slug for the event page
                          example: /sport/horse-racing/ascot/2017/12/22/15:40
                          type: string
                        name:
                          description: The name of the event
                          example: '15:40'
                          type: string
                        parent_id:
                          description: This ID uniquely identifies the parent of the
                            event
                          example: '565413'
                          nullable: true
                          pattern: ^[0-9]+$
                          type: string
                        slug:
                          description: An easier way to identify the event
                          example: ascot-2017-12-22T00:00:00-15-40
                          type: string
                        state:
                          description: "\nEvent state can have the following values:\n\
                            <ul>\n<li>upcoming: the event is now open for betting\n\
                            <li>live: the event is now live in-play\n<li>ended: the\
                            \ event has ended and its markets should be settled\n\
                            <li>settled: the event has ended and its markets should\
                            \ be settled\n<li>cancelled: the event was cancelled and\
                            \ didn't take place\n<li>suspended: the event was suspended\
                            \ and during play time\n</ul>\n    "
                          enum:
                          - new
                          - upcoming
                          - live
                          - ended
                          - settled
                          - cancelled
                          - suspended
                          example: new
                          type: string
                        type:
                          description: The type of the event, for instance, the name
                            of the sport<br>
                          oneOf:
                          - enum:
                            - american_football_match
                            - american_football_outright
                            - baseball_match
