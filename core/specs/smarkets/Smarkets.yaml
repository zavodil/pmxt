        The rate limits below are applicable to API users.

        The rate limits for non-API users are lower.


        ##  Rate limits

        Maximum 50 requests per 60 seconds'
      operationId: get_quotes
      parameters:
      - description: Market IDs to filter by<br>maxItems:200
        in: path
