  /v3/events/:
    get:
      description: '## Description

        Events in Smarkets follow a tree structure per sport,

        where events can have several child events, but only one parent event.<br>

        As an example for football, we have:<ul>

        <li>The root event which is the sport - Football

        <li>Child events which are leagues - Premier League, La Liga, etc

        <li>Grandchild events which are football matches - Man U vs Chelsea, ...

        </ul><br>

        <p>In the case of most sports, we have 3 levels in the tree. However,

        there are cases where we can have a different number.</p>

        <p>To identify whether an event is a leaf node in this tree, one can look
        at the bettable flag.</p>

        <p>Only leaf events can have markets, which in turn will have contracts.</p>


        '
      operationId: get_events
      parameters:
      - deprecated: false
        description: Event IDs to filter by
        in: query
        name: id
        schema:
          description: Event IDs to filter by
          items:
            description: This ID uniquely identifies an event
            example: '565413'
            pattern: ^[0-9]+$
            type: string
          type: array
          uniqueItems: true
      - deprecated: false
        description: True if trading will be open when the markets go live in-play
        in: query
        name: inplay_enabled
        schema:
          description: True if trading will be open when the markets go live in-play
          type: boolean
      - deprecated: false
        description: Event states to filter by
        in: query
        name: state
        schema:
          default:
          - new
          - upcoming
          - live
          description: Event states to filter by
          items:
            description: "\nEvent state can have the following values:\n<ul>\n<li>upcoming:\
              \ the event is now open for betting\n<li>live: the event is now live\
              \ in-play\n<li>ended: the event has ended and its markets should be\
              \ settled\n<li>settled: the event has ended and its markets should be\
              \ settled\n<li>cancelled: the event was cancelled and didn't take place\n\
              <li>suspended: the event was suspended and during play time\n</ul>\n\
              \    "
            enum:
            - new
            - upcoming
            - live
            - ended
            - settled
            - cancelled
            - suspended
