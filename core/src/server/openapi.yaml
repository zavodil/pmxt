        - in: path
          name: exchange
          schema:
            type: string
            enum:
              - router
          required: true
          description: The prediction market exchange to target.
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Keyword search across matched market titles.
        - in: query
          name: category
          required: false
          schema:
            type: string
          description: Filter matches by category.
        - in: query
          name: market
          required: false
