          properties:
            outcome:
              type: string
              enum:
                - 'yes'
                - 'no'
                - up
                - down
            min:
              type: number
            max:
              type: number
          required:
            - outcome
    EventFilterCriteria:
      type: object
      properties:
        text:
          type: string
        searchIn:
          type: array
          items:
            type: string
            enum:
              - title
