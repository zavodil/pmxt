            allOf:
              - $ref: '#/components/schemas/UnifiedMarket'
          description: Pass a UnifiedMarket directly instead of marketId/slug/url.
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: Lookup a specific market by ID. Omit for browse mode.
        - in: query
          name: slug
          required: false
          schema:
            type: string
        - in: query
          name: url
          required: false
          schema:
            type: string
        - in: query
          name: relation
          required: false
          schema:
            type: string
            enum:
              - identity
              - subset
              - superset
              - overlap
              - disjoint
        - in: query
          name: minConfidence
          required: false
          schema:
            type: number
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: includePrices
          required: false
          schema:
            type: boolean
        - in: query
          name: minDifference
          required: false
          schema:
            type: number
          description: Minimum price difference between venues. Browse mode only.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - confidence
              - volume
              - priceDifference
          description: Sort order. Browse mode only.
      responses:
        '200':
          description: Find Hedging Opportunities response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
